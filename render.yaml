services:
  # PostgreSQL Database
  - type: pserv
    name: votex-db
    plan: free
    databaseName: votex_db
    databaseUser: votex_user

  # Web Service
  - type: web
    name: votex-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn backend.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: DJANGO_SETTINGS_MODULE
        value: backend.settings_prod
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: votex-db
          property: connectionString
