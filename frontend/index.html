<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#4F46E5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="VoteX" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    
    <!-- SEO Meta Tags -->
    <title>VoteX — Know Your Vote. Own Your Democracy.</title>
    <meta name="description" content="VoteX is India's premier election education platform. Learn about voter registration, the voting process, EVMs, eligibility, and more through interactive guides and quizzes." />
    <meta name="keywords" content="India election, voter registration, how to vote, EVM, VVPAT, voter eligibility, election guide, election commission, lok sabha, democracy" />
    <meta name="author" content="VoteX" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="VoteX — Know Your Vote. Own Your Democracy." />
    <meta property="og:description" content="Interactive election education platform for Indian voters. Step-by-step guides, quizzes, and eligibility checker." />
    <meta property="og:type" content="website" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="VoteX — Election Education Platform" />
    <meta name="twitter:description" content="Know your vote. Own your democracy. Interactive election guides for every Indian citizen." />

    <!-- Preconnect for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered:', registration);
            })
            .catch((error) => {
              console.log('SW registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
