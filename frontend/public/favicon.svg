<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- Ballot Box -->
  <rect x="8" y="16" width="32" height="26" rx="2" fill="#4F46E5" stroke="#312E81" stroke-width="2"/>
  
  <!-- Box Opening Slot -->
  <rect x="12" y="14" width="24" height="4" rx="1" fill="#312E81"/>
  
  <!-- Ballot Paper being inserted -->
  <path d="M18 6 L18 18 L30 18 L30 6 Z" fill="#FFFFFF" stroke="#4F46E5" stroke-width="2"/>
  
  <!-- Check mark on ballot -->
  <path d="M21 10 L24 13 L28 9" stroke="#4F46E5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Box details/lines -->
  <line x1="12" y1="24" x2="36" y2="24" stroke="#312E81" stroke-width="1" opacity="0.3"/>
  <line x1="12" y1="30" x2="36" y2="30" stroke="#312E81" stroke-width="1" opacity="0.3"/>
  
  <!-- Lock symbol on box -->
  <circle cx="24" cy="36" r="2.5" fill="#FFFFFF" opacity="0.8"/>
  <rect x="23" y="36" width="2" height="3" fill="#FFFFFF" opacity="0.8"/>
</svg>
